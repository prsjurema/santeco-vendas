<!DOCTYPE html>
<html lang="es-MX"><head><meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<meta name="santeco-cutoff" content="2026-06-28">
<meta name="santeco-published" content="2026-06-30">
<title>Reporte de Ventas Santeco</title></head>
<body>
<script>
(async()=>{
  const N=10;let b="";
  for(let i=0;i<N;i++){const r=await fetch("td/t"+i+".txt",{cache:"no-store"});b+=(await r.text());}
  b=b.replace(/\\s/g,"");
  const by=Uint8Array.from(atob(b),c=>c.charCodeAt(0));
  const s=new Blob([by]).stream().pipeThrough(new DecompressionStream("gzip"));
  document.open();document.write(await new Response(s).text());document.close();
})();
</script></body></html>
